<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SeekStar</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #12141a;
      }

      body {
        display: grid;
        place-items: center;
        color: #c8ced8;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      .splash-mark {
        display: grid;
        place-items: center;
        animation: splash-breathe 2.4s cubic-bezier(0.22, 1, 0.36, 1) infinite;
      }

      @keyframes splash-breathe {
        0%,
        100% {
          opacity: 0.82;
        }

        50% {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="splash-mark" aria-hidden="true">
      <svg fill="none" height="72" viewBox="0 0 72 72" width="72" xmlns="http://www.w3.org/2000/svg">
        <g stroke="currentColor" stroke-linecap="square" stroke-linejoin="miter" stroke-width="2">
          <path d="M18 50 L50 26" />
          <path d="M16 52 L20 48" />
          <path d="M48 28 L52 24" />
          <path d="M16 52 L12 56" />
          <path d="M52 24 L56 20" />
          <path d="M34 42 L34 58" />
          <path d="M34 58 L24 64" />
          <path d="M34 58 L44 64" />
          <path d="M34 58 L34 64" />
        </g>
      </svg>
    </div>
  </body>
</html>
